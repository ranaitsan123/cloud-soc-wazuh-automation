name: Configure Victim Server
description: Install Wazuh agent, Docker, and run victim container

tasks:
  - name: Update apt cache
    type: shell
    cmd: sudo apt-get update

  - name: Install Victim server prerequisites
    type: package
    packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - git
      - wget
      - awscli
      - python3
      - python3-pip

  - name: Install Docker GPG key
    type: shell
    cmd: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmour -o /usr/share/keyrings/docker-archive-keyring.gpg
    skip_if_exists: /usr/share/keyrings/docker-archive-keyring.gpg

  - name: Add Docker apt repository
    type: shell
    cmd: echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

  - name: Update apt cache again
    type: shell
    cmd: sudo apt-get update

  - name: Install Docker Engine and Compose plugin
    type: package
    packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin

  - name: Enable Docker service
    type: service
    name: docker
    state: started
    enabled: true

  - name: Install Wazuh repository GPG key
    type: shell
    cmd: curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH | sudo gpg --dearmour -o /usr/share/keyrings/wazuh.gpg
    skip_if_exists: /usr/share/keyrings/wazuh.gpg

  - name: Add Wazuh agent repository
    type: shell
    cmd: echo "deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main" | sudo tee /etc/apt/sources.list.d/wazuh.list > /dev/null

  - name: Update apt cache for Wazuh
    type: shell
    cmd: sudo apt-get update

  - name: Install Wazuh agent
    type: package
    packages:
      - wazuh-agent

  - name: Create /opt/fortress directory
    type: directory
    paths:
      - /opt/fortress
    mode: '0755'

  - name: Install PowerShell Core
    type: shell
    cmd: |
      if [ ! -f /etc/apt/sources.list.d/microsoft-prod.list ]; then
        curl -s https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb -o /tmp/packages-microsoft-prod.deb
        sudo dpkg -i /tmp/packages-microsoft-prod.deb
        rm /tmp/packages-microsoft-prod.deb
      fi
      sudo apt-get update
      sudo apt-get install -y powershell
      sudo rm -rf /var/lib/apt/lists/*

  - name: Install Invoke-AtomicRedTeam PowerShell module
    type: shell
    cmd: |
      pwsh -Command "Set-PSRepository -Name PSGallery -InstallationPolicy Trusted; Install-Module -Name Invoke-AtomicRedTeam -Force -Scope AllUsers"

  - name: Sync Atomic Red Team atomics from S3
    type: shell
    cmd: |
      if [ "{{ s3_bucket_name }}" = "" ]; then
        echo "s3_bucket_name not provided"
        exit 1
      fi

      sudo mkdir -p /opt/fortress/atomics
      sudo aws s3 sync "s3://{{ s3_bucket_name }}/atomics/" /opt/fortress/atomics/ --delete

  - name: Configure Wazuh agent manager connection
    type: shell
    cmd: |
      if [ "{{ wazuh_manager_ip }}" = "" ]; then
        echo "wazuh_manager_ip not provided"
        exit 1
      fi

      sudo sed -i 's|MANAGER_IP|{{ wazuh_manager_ip }}|g' /var/ossec/etc/ossec.conf

  - name: Enable Wazuh agent service
    type: service
    name: wazuh-agent
    state: started
    enabled: true

  - name: Login to ECR
    type: shell
    cmd: |
      aws ecr get-login-password --region {{ aws_region }} | docker login --username AWS --password-stdin $(echo "{{ ecr_victim_repository_url }}" | cut -d'/' -f1)

  - name: Pull victim container image from ECR
    type: shell
    cmd: docker pull {{ ecr_victim_repository_url }}:latest

  - name: Start victim container
    type: shell
    cmd: |
      docker rm -f victim-art 2>/dev/null || true
      docker run -d \
        --name victim-art \
        --restart always \
        -v /opt/fortress:/opt/fortress \
        {{ ecr_victim_repository_url }}:latest \
        tail -f /dev/null

  - name: Verify victim container is running
    type: shell
    cmd: |
      docker ps --filter "name=victim-art"
      docker exec victim-art ls -la /opt/fortress || echo "Warning: /opt/fortress not accessible"
      
  - name: Verify Wazuh agent is active
    type: shell
    cmd: |
      sudo systemctl is-active wazuh-agent
      sudo systemctl is-enabled wazuh-agent
