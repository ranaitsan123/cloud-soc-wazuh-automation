version: "3.9"

services:
  wazuh-indexer:
    image: "${WAZUH_INDEXER_IMAGE:-wazuh/wazuh-indexer:4.14.4}"
    container_name: wazuh-indexer
    restart: unless-stopped
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
    ports:
      - "9200:9200"

  wazuh-manager:
    image: "${WAZUH_MANAGER_IMAGE:-wazuh/wazuh-manager:4.14.4}"
    container_name: wazuh-manager
    restart: unless-stopped
    depends_on:
      - wazuh-indexer
    ports:
      - "1514:1514"
      - "1515:1515"
      - "55000:55000"
    volumes:
      - wazuh_manager_data:/var/ossec/data
      - ../automation:/var/ossec/integrations/custom:ro
      - ./ossec.conf:/var/ossec/etc/ossec.conf:ro
      - ./rules:/var/ossec/etc/rules:ro

  wazuh-dashboard:
    image: "${WAZUH_DASHBOARD_IMAGE:-wazuh/wazuh-dashboard:4.14.4}"
    container_name: wazuh-dashboard
    restart: unless-stopped
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    environment:
      - WAZUH_INDEXER_URL=https://wazuh-indexer:9200
    ports:
      - "443:443"

volumes:
  wazuh_indexer_data:
  wazuh_manager_data:

