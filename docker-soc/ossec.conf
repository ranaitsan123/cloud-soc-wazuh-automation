<ossec_config>
  <global>
    <email_notification>no</email_notification>
    <smtp_server>127.0.0.1</smtp_server>
  </global>

  <active-response>
    <command>isolate-ec2</command>
    <location>local</location>
    <level>10</level>
  </active-response>

  <command>
    <name>isolate-ec2</name>
    <executable>python3</executable>
    <extra_args>/var/ossec/integrations/custom/isolate_vm.py</extra_args>
    <timeout>600</timeout>
  </command>
</ossec_config>
