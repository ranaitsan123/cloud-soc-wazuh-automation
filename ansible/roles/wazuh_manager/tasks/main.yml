- name: Ensure apt cache is updated
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  changed_when: false

- name: Install Wazuh manager prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - git
      - awscli
      - python3
      - python3-pip
    state: present

- name: Install Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
    state: present
    filename: docker

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Install boto3 Python module
  ansible.builtin.pip:
    name: boto3
    executable: pip3

- name: Ensure Wazuh directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    recurse: yes
    owner: "{{ wazuh_user }}"
    group: "{{ wazuh_group }}"
    mode: '0755'
  loop:
    - /opt/wazuh
    - /opt/wazuh/config
    - /opt/wazuh/config/wazuh_cluster
    - /opt/wazuh/config/wazuh_indexer
    - /opt/wazuh/config/wazuh_dashboard
    - /opt/wazuh/config/wazuh_indexer_ssl_certs

- name: Download Wazuh configuration artifacts from S3
  amazon.aws.aws_s3:
    bucket: "{{ s3_bucket_name }}"
    object: "{{ item.object }}"
    dest: "{{ item.dest }}"
    mode: get
    overwrite: yes
    region: "{{ aws_region }}"
  loop:
    - object: "{{ s3_prefix }}/docker-compose.yml"
      dest: /opt/wazuh/docker-compose.yml
    - object: "{{ s3_prefix }}/generate-indexer-certs.yml"
      dest: /opt/wazuh/generate-indexer-certs.yml
    - object: "{{ s3_prefix }}/config/certs.yml"
      dest: /opt/wazuh/config/certs.yml
    - object: "{{ s3_prefix }}/config/wazuh_cluster/wazuh_manager.conf"
      dest: /opt/wazuh/config/wazuh_cluster/wazuh_manager.conf
    - object: "{{ s3_prefix }}/config/wazuh_indexer/wazuh.indexer.yml"
      dest: /opt/wazuh/config/wazuh_indexer/wazuh.indexer.yml
    - object: "{{ s3_prefix }}/config/wazuh_indexer/internal_users.yml"
      dest: /opt/wazuh/config/wazuh_indexer/internal_users.yml
    - object: "{{ s3_prefix }}/config/wazuh_dashboard/opensearch_dashboards.yml"
      dest: /opt/wazuh/config/wazuh_dashboard/opensearch_dashboards.yml
    - object: "{{ s3_prefix }}/config/wazuh_dashboard/wazuh.yml"
      dest: /opt/wazuh/config/wazuh_dashboard/wazuh.yml

- name: Validate Wazuh Docker Compose configuration
  ansible.builtin.shell: |
    docker compose -f /opt/wazuh/docker-compose.yml config
  args:
    executable: /bin/bash

- name: Generate certificates if needed
  ansible.builtin.shell: |
    if [ ! -d /opt/wazuh/config/wazuh_indexer_ssl_certs ] || [ -z "$(ls -A /opt/wazuh/config/wazuh_indexer_ssl_certs 2>/dev/null)" ]; then
      cd /opt/wazuh
      docker compose -f generate-indexer-certs.yml run --rm generator
    fi
  args:
    executable: /bin/bash

- name: Fix permissions for /opt/wazuh
  ansible.builtin.file:
    path: /opt/wazuh
    recurse: yes
    owner: "{{ wazuh_user }}"
    group: "{{ wazuh_group }}"
    mode: '0755'

- name: Start Wazuh services with Docker Compose
  community.docker.docker_compose:
    project_src: /opt/wazuh
    files:
      - /opt/wazuh/docker-compose.yml
    state: present
