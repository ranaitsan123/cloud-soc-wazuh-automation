- name: Ensure apt cache is updated
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  changed_when: false

- name: Install Victim server prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - git
      - wget
      - awscli
      - python3
      - python3-pip
    state: present

- name: Install Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
    state: present
    filename: docker

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Ensure Wazuh repository key file exists
  ansible.builtin.command:
    cmd: |
      curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH | gpg --dearmour -o /usr/share/keyrings/wazuh.gpg
  args:
    creates: /usr/share/keyrings/wazuh.gpg

- name: Add Wazuh agent repository
  ansible.builtin.apt_repository:
    repo: deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main
    state: present
    filename: wazuh

- name: Install Wazuh agent
  ansible.builtin.apt:
    name: wazuh-agent
    state: present
    default_release: stable

- name: Enable and start Wazuh agent
  ansible.builtin.service:
    name: wazuh-agent
    state: started
    enabled: yes

- name: Ensure /opt/fortress directory exists
  ansible.builtin.file:
    path: /opt/fortress
    state: directory
    owner: "{{ wazuh_user | default(ansible_user_id | default('root')) }}"
    group: "{{ wazuh_group | default(wazuh_user | default(ansible_user_id | default('root'))) }}"
    mode: '0755'

- name: Configure Wazuh agent manager connection
  ansible.builtin.lineinfile:
    path: /var/ossec/etc/ossec.conf
    regexp: '<manager>'
    line: '      <address>{{ wazuh_manager_ip }}</address>'
    insertafter: '<!-- Manager connection -->'
    state: present
  notify: restart wazuh-agent

- name: Validate victim ECR repository URL is configured
  ansible.builtin.assert:
    that:
      - ecr_victim_repository_url is defined
      - ecr_victim_repository_url != ''
    fail_msg: "The ECR victim repository URL must be provided as an Ansible extra var."

- name: Notify that ECR repository readiness is being polled
  ansible.builtin.debug:
    msg: "Waiting for ECR repository '{{ ecr_victim_repository_url }}' to be available..."

- name: Verify ECR repository exists and is accessible
  ansible.builtin.shell: |
    repo_name=$(echo "{{ ecr_victim_repository_url }}" | cut -d'/' -f2-)
    aws ecr describe-repositories --repository-names "$repo_name" --region {{ aws_region }}
  args:
    executable: /bin/bash
  register: ecr_repo_check
  retries: 20
  delay: 30
  until: ecr_repo_check.rc == 0
  changed_when: false

- name: Notify that ECR image tag readiness is being polled
  ansible.builtin.debug:
    msg: "Waiting for ECR image 'latest' in '{{ ecr_victim_repository_url }}' to be available..."

- name: Verify ECR image tag exists in repository
  ansible.builtin.shell: |
    repo_name=$(echo "{{ ecr_victim_repository_url }}" | cut -d'/' -f2-)
    aws ecr describe-images --repository-name "$repo_name" --image-ids imageTag=latest --region {{ aws_region }}
  args:
    executable: /bin/bash
  register: ecr_image_check
  retries: 20
  delay: 30
  until: ecr_image_check.rc == 0
  changed_when: false

- name: Notify that ECR login retries are starting
  ansible.builtin.debug:
    msg: "Attempting to login to ECR registry for '{{ ecr_victim_repository_url }}'..."

- name: Login to ECR
  ansible.builtin.shell: |
    aws ecr get-login-password --region {{ aws_region }} | docker login --username AWS --password-stdin $(echo "{{ ecr_victim_repository_url }}" | cut -d'/' -f1)
  args:
    executable: /bin/bash
  register: ecr_login
  retries: 5
  delay: 15
  until: ecr_login.rc == 0

- name: Notify that image pull retries are starting
  ansible.builtin.debug:
    msg: "Pulling image '{{ ecr_victim_repository_url }}:latest' from ECR. Will retry until available."

- name: Pull victim container image from ECR
  ansible.builtin.shell: |
    docker pull "{{ ecr_victim_repository_url }}:latest"
  args:
    executable: /bin/bash
  register: pull_result
  retries: 20
  delay: 30
  until: pull_result.rc == 0

- name: Ensure victim-art container is running
  ansible.builtin.docker_container:
    name: victim-art
    image: "{{ ecr_victim_repository_url }}:latest"
    state: started
    restart_policy: always
    volumes:
      - /opt/fortress:/opt/fortress
    command: tail -f /dev/null
