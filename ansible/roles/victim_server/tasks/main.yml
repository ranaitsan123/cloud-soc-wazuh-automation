- name: Ensure apt cache is updated
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install Victim server prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - git
      - wget
      - awscli
      - python3
      - python3-pip
    state: present
    update_cache: yes

- name: Install Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
    state: present
    filename: docker

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Ensure Wazuh repository key file exists
  ansible.builtin.command:
    cmd: |
      curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH | gpg --dearmour -o /usr/share/keyrings/wazuh.gpg
  args:
    creates: /usr/share/keyrings/wazuh.gpg

- name: Add Wazuh agent repository
  ansible.builtin.apt_repository:
    repo: deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main
    state: present
    filename: wazuh

- name: Install Wazuh agent
  ansible.builtin.apt:
    name: wazuh-agent
    state: present
    update_cache: yes
    default_release: stable

- name: Enable and start Wazuh agent
  ansible.builtin.service:
    name: wazuh-agent
    state: started
    enabled: yes

- name: Ensure /opt/fortress directory exists
  ansible.builtin.file:
    path: /opt/fortress
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Login to ECR
  ansible.builtin.shell: |
    aws ecr get-login-password --region {{ aws_region }} | docker login --username AWS --password-stdin {{ ecr_victim_repository_url }}
  args:
    executable: /bin/bash

- name: Pull victim container image from ECR
  ansible.builtin.shell: |
    docker pull {{ ecr_victim_repository_url }}:latest
  args:
    executable: /bin/bash

- name: Ensure victim-art container is running
  ansible.builtin.shell: |
    if docker ps --format '{{"{{.Names}}"}}' | grep -q '^victim-art$'; then
      echo 'victim-art already running'
    else
      docker rm -f victim-art 2>/dev/null || true
      docker run -d --name victim-art -v /opt/fortress:/opt/fortress {{ ecr_victim_repository_url }}:latest tail -f /dev/null
    fi
  args:
    executable: /bin/bash
