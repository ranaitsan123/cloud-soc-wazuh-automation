- name: Ensure apt cache is updated
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  changed_when: false

- name: Install Victim server prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - git
      - wget
      - awscli
      - python3
      - python3-pip
    state: present

- name: Install Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
    state: present
    filename: docker

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Ensure Wazuh repository key file exists
  ansible.builtin.command:
    cmd: |
      curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH | gpg --dearmour -o /usr/share/keyrings/wazuh.gpg
  args:
    creates: /usr/share/keyrings/wazuh.gpg

- name: Add Wazuh agent repository
  ansible.builtin.apt_repository:
    repo: deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main
    state: present
    filename: wazuh

- name: Install Wazuh agent
  ansible.builtin.apt:
    name: wazuh-agent
    state: present
    default_release: stable

- name: Ensure Wazuh agent is enabled and started
  ansible.builtin.service:
    name: wazuh-agent
    state: started
    enabled: yes

- name: Ensure /opt/fortress directory exists
  ansible.builtin.file:
    path: "{{ fortress_dir }}"
    state: directory
    owner: "{{ wazuh_user }}"
    group: "{{ wazuh_group }}"
    mode: '0755'

- name: Remove stale Wazuh manager address entries
  ansible.builtin.replace:
    path: /var/ossec/etc/ossec.conf
    regexp: '^\s*<address>.*</address>\s*$'
    replace: ''
  ignore_errors: yes

- name: Configure Wazuh manager connection
  ansible.builtin.lineinfile:
    path: /var/ossec/etc/ossec.conf
    regexp: '^\s*<address>.*</address>\s*$'
    line: '      <address>{{ wazuh_manager_ip }}</address>'
    insertafter: '<manager>'
    state: present
  notify: restart wazuh-agent

- name: Validate victim ECR repository URL is configured
  ansible.builtin.assert:
    that:
      - ecr_victim_repository_url is defined
      - ecr_victim_repository_url != ''
    fail_msg: "The ECR victim repository URL must be provided as an Ansible extra var."

- name: Parse ECR registry information
  ansible.builtin.set_fact:
    ecr_registry: "{{ ecr_victim_repository_url.split('/')[0] }}"
    ecr_repository_name: "{{ ecr_victim_repository_url.split('/', 1)[1] }}"

- name: Retrieve ECR login password
  ansible.builtin.shell: |
    aws ecr get-login-password --region {{ aws_region }}
  args:
    executable: /bin/bash
  register: ecr_login_password
  changed_when: false
  failed_when: ecr_login_password.rc != 0

- name: Log in to ECR
  community.docker.docker_login:
    registry_url: "{{ ecr_registry }}"
    username: AWS
    password: "{{ ecr_login_password.stdout }}"

- name: Pull victim container image from ECR
  community.docker.docker_image:
    name: "{{ ecr_victim_repository_url }}"
    tag: "{{ victim_container_image_tag }}"
    source: pull

- name: Ensure victim-art container is running
  community.docker.docker_container:
    name: "{{ victim_container_name }}"
    image: "{{ ecr_victim_repository_url }}:{{ victim_container_image_tag }}"
    state: started
    restart_policy: always
    recreate: yes
    volumes:
      - "{{ fortress_dir }}:{{ fortress_dir }}"
